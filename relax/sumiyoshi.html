<u>住吉公園</u>
<h2>
    花と水の広場<br>
    <small>
        <a href="https://maps.app.goo.gl/1BVDWed4rc1dBdzq8" target="_blank">住之江区浜口東１丁目１</a>
    </small>
</h2>
<p>
    住吉公園にいつもいる鳥はサギ？ 多分そうだと思うけど確かではない。<br>
    公園から住吉大社までを貫く表参道にある灯籠の上にとまっていた、一羽を撮影してたら糞をした。水っぽい糞が灯籠に滴る。
</p>

</p>

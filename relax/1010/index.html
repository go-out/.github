<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="format-detection" content="telephone=no" />

    <!--og:meta-->
    <meta content="website" property="og:type">
    <title>Japan ♨ Map | 全国銭湯マップ</title>
    <meta content="Japan ♨ Map | 全国銭湯マップ" property="og:title">
    <meta content="" name="description">
    <meta content="" name="og:description">

    <!--for Twitter-->
    <meta content="summary_large_image" name="twitter:card">
    <meta content="https://creative-community.space/map/relax/1010/" property="og:url">

    <link rel="icon" href="../../profile/img/favicon.png">
    <link rel="icon" href="../../profile/img/mobile.png" sizes="192x192">
    <link rel="apple-touch-icon-precomposed" href="../../profile/img/mobile.png" sizes="180x180">

    <link rel="stylesheet" href="../../profile/css/style.css">
    <link rel="stylesheet" href="../../profile/css/index.css">
    <link rel="stylesheet" href="../../profile/css/marker.css">
    <link rel="stylesheet" href="../../profile/css/popup.css">

    <style>
        header address a {
            font-size: 150%;
        }

        header h3 a {
            font-size: 200%;
        }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@0;1&family=Zen+Maru+Gothic&display=swap"
        rel="stylesheet">

    <!-- Mapbox -->
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css' rel='stylesheet' />

    <script src="../../profile/js/mapbox.js"></script>
    <script src="osaka/index.js"></script>
    <script>
        let directory = "../../"

        document.addEventListener("readystatechange", (event) => {
            if (event.target.readyState === "interactive") {
                addMarker(osaka268.features)
            } else if (event.target.readyState === "complete") {
                const goout = document.querySelector('#map');
                const title = document.querySelector('#title');
                const dialog = document.querySelector("dialog");
                const close = document.querySelector('dialog #close');
                const menu = document.querySelector('footer button');
                goout.style.pointerEvents = 'auto';
                goout.style.userSelect = 'auto';
                title.hidden = true;
                menu.hidden = false;

                menu.addEventListener('click', function () {
                    dialog.showModal();
                })

                close.addEventListener('click', function () {
                    dialog.close();
                })
            }
        })
    </script>
</head>

<body>
    <h1 id="title">
        <strong class="goout">Japan ♨ Map</strong>
        <button type="button" class="goout">creative-community.space</button>
    </h1>

    <header>
        <h2 id="latlng" class="goout shadow"></h2>
        <address id="address" class="goout"></address>
        <h3 id="datetime" class="goout"></h3>
    </header>

    <div id="map"></div>

    <footer>
        <button type="button" hidden></button>
    </footer>

    <dialog>
        <input type="button" id="close" value="×">
        <details class="goout">
            <summary>
                <small>このウェブサイトに投稿された位置情報を使って、私（わたしたち）がいた場所を集めた様々な地図を作成します。</small>
            </summary>
        </details>

        <h3 class="relax">
            We Create a
            <b>Map</b>
            of
            <u>Where I（We）Were</u>
            by location informations submit on this website.
            <br>
            <small class="relax">
                You can add pins of your current locationon on this map by click
                <strong class="goout">I'm here !</strong>
            </small>
        </h3>
    </dialog>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoicGVodSIsImEiOiJja3R4Y3diNmIybTg5Mm9waWgwYTdsc3FyIn0.lVvnPZ3aa6332EaWJIxPaQ';

        let css = 'mapbox://styles/mapbox/standard',
            center = [138.45771366695845, 36.49919838567996];

        const bounds = [
            [122.26435698487535, 23.24028755602758], // 南西座標
            [155.15191816980064, 49.928032116735665] // 北東座標
        ]

        const map = new mapboxgl.Map({
            container: 'map',
            center: center,
            style: css,
            zoom: 4.5,
            scrollZoom: true,
            projection: 'globe',
            attributionControl: false,
            maxBounds: bounds
        })

        map.addControl(
            new mapboxgl.GeolocateControl({
                positionOptions: {
                    enableHighAccuracy: true
                },
                // デバイスの位置の変更に応じて位置情報を更新
                trackUserLocation: true,
                // デバイスが向いている方向を矢印で描画
                showUserHeading: true
            })
        )
        map.addControl(new mapboxgl.NavigationControl())
        map.addControl(new mapboxgl.FullscreenControl())
    </script>
</body>

</html>

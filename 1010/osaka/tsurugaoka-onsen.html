<h2>
    つるが丘温泉<br>
    <small>
        <a href="https://maps.app.goo.gl/tqytBfyfrQ2vkHuE8" target="_blank">東住吉区山坂５丁目４−１３</a>
    </small>
</h2>
<small>営業時間 13:00~23:00</small><br>
<small>定休日 金曜日</small>
<hr>
<p>
    ガラス張りのスタイリッシュな建物。かっこいい外観。<br>
    螺旋階段を上った2階は健康コーナーと書いていて期待が高まったのですが、2階はもう営業されていないとのこと・・・<br>
    昔は2階で汗を流して、お風呂に入るという健康ルーティンで営業されていたらしいです。
</p>
<p>
    フロントロビー・脱衣所は広くて綺麗。アイスや牛乳などのドリンクの販売もあり、お風呂上がりに憩うこともできます。<br>
    風呂場は段差と曲線をうまく使った工夫のあるデザイン。サウナ・水風呂前にととのいスペースがあるのが嬉しい。
</p>

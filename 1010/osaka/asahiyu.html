<hr>
<p>
    大阪・関西を中心に数多くの銭湯を施工する「なにわ工務店」による、ザ・なにわ！な銭湯。<br>
    たくさんの造花と多種多様なユニーク風呂がある浴場、テーブル・ソファ完備でゆったりとくつろげる広々と明るいフロントロビー。<br>
    明るく開放的で清潔感があるので、銭湯好きはもちろん、銭湯に苦手意識がある方でも満足できると思います。
</p>

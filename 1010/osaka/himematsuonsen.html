<p>
    昔ながらの番台式銭湯。憩いの間も兼ねた広い脱衣所は姫松温泉ならでは。<br>
    世界中のビールなどドリンクも豊富で、お風呂上がりにゆっくりくつろげます。<br>
    浴場は一般的ないい銭湯。露天風呂には、頻繁に特別な季節の湯が用意されています。
</p>

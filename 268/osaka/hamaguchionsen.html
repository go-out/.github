<hr>
<p>
    浜口温泉は100年続くお風呂屋さん。<br>
    銭湯の入浴料は都道府県で一律だと思っていたんですが、浜口温泉は300円という安さで入れます。<br>
    今の3代目で潰すわけにはいかんと頑張っているそうです。
</p>
<p>
    25年前に先代がどうしても作りたくて作ったらしい、螺旋階段と露天風呂が浜口温泉最大の特徴。<br>
    あと、他の銭湯はほとんど石油に移行しているところ、今でも薪で焚く珍しいタイプだそうです。
</p>

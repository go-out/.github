<h2>
    <a href="https://www.instagram.com/shiko_cafe/" target="_blank">紫光（しこう）</a><br>
    <small>
        <a href="https://maps.app.goo.gl/7vFTVPRctR4YdcD97" target="_blank">住之江区北加賀屋２丁目３−１５</a>
    </small>
</h2>
<p>
    北加賀屋に通うようになり、いきつけになった喫茶・レストラン<br>
    店名の通り、昼過ぎ(15時頃)の窓際には、軒先のひさしテント越しに美しい紫の光が差し込む。
</p>
<p>珈琲・ジュース・パフェなどの喫茶メニューだけでなく、洋食メニューも豊富なのでレストラン利用もおすすめ。</p>
<p>（ランチタイムの日替わり定食だけでなく、ディナータイムにもオトクなサービス定食があり、コスパも良い。）</p>

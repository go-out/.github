<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">

    <!--og:meta-->
    <meta content="website" property="og:type">
    <title>大阪バーチャルツアー</title>
    <meta content="大阪バーチャルツアー" property="og:title">
    <meta content="【VR】 Osaka 🌐 Virtual 📹 Tour | #画面分割" name="description">
    <meta content="【VR】 Osaka 🌐 Virtual 📹 Tour | #画面分割" property="og:description">

    <link rel="icon" href="../../profile/img/favicon.png">
    <link rel="icon" href="../../profile/img/mobile.png" sizes="192x192">
    <link rel="apple-touch-icon-precomposed" href="../../profile/img/mobile.png" sizes="180x180">

    <!--for Twitter-->
    <meta content="summary_large_image" name="twitter:card">
    <meta content="https://creative-community.space/map/osaka/vr/" property="og:url">
    <meta content="https://creative-community.space/map/osaka/vr/index.png" property="og:image">
    <meta content="https://creative-community.space/map/osaka/vr/index.png" name="twitter:image:src">

    <script src="../../vr/index.js"></script>
    <script>
        // ?area=エリア&name=名前
        const urlParam = location.search.substring(1)
        if (urlParam) {
            let paramArr = [],
                param = urlParam.split('&')
            for (arr = 0; arr < param.length; arr++) {
                var paramItem = param[arr].split('=')
                paramArr[paramItem[0]] = paramItem[1]
            }
            let json = '../' + paramArr.area + '/' + paramArr.name + '.json'
            indexJSON(json)
        } else {
            let json = 'index.json'
            indexJSON(json)
        }
    </script>

    <link rel="stylesheet" href="../../vr/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap" rel="stylesheet">
</head>

<body class="start">
    <main>
        <header>
            <small id="year"></small>
            <h1>
                <strong>Go Out</strong>
            </h1>
            <h2>
                <strong id="month"></strong>
                <strong id="day"></strong>
            </h2>
            <button id="play" type="button"></button>
        </header>
    </main>

    <article>
        <h3>
            <strong id="title"></strong>
        </h3>
        <section id="info"></section>
        <div id="links" hidden>
            <h3>関連ページ Related Pages</h3>
        </div>
    </article>

    <footer>
        <select name="vr" id="kita" hidden>
            <option disabled selected>梅田・中之島・淀川エリア</option>
        </select>
        <select name="vr" id="chuo" hidden>
            <option disabled selected>心斎橋・本町・大阪城エリア</option>
        </select>
        <select name="vr" id="namba">
            <option disabled selected>なんば・天王寺・西成エリア</option>
            <option value="abeno-nantou">阿倍野区南東部</option>
        </select>
        <select name="vr" id="sumiyoshi">
            <option disabled selected>住吉・長居エリア</option>
            <option value="tezukayama">帝塚山</option>
            <option value="nanbu">住吉区南部</option>
            <option value="kohama-ss">粉浜商店街・粉浜本通商店街</option>
        </select>
        <select name="vr" id="bayarea">
            <option disabled selected>大阪ベイエリア</option>
            <option value="taisho-minami">新木津川大橋 ⇄ 千本松大橋</option>
            <option value="port-town">南港ポートタウン</option>
            <option value="container_berth">咲洲コンテナターミナル</option>
            <option value="nanko-minami">住之江公園駅から南港南の西の果てまで</option>
        </select>
        <select name="vr" id="higashi" hidden>
            <option disabled selected>城北・城東・コリアンエリア</option>
        </select>
        <select name="vr" id="sakai" hidden>
            <option disabled selected>堺・泉北エリア</option>
        </select>
        <select name="vr" id="kawachi" hidden>
            <option disabled selected>河内長野エリア</option>
        </select>
        <select name="vr" id="hokusetsu" hidden>
            <option disabled selected>北摂エリア</option>
        </select>
        <select name="vr" id="senshu" hidden>
            <option disabled selected>泉州エリア</option>
        </select>
        <button onclick="history.back()">↩︎</button>
    </footer>

    <script>
        function valueChange(e) {
            // イベントが発生した時の処理
            e.preventDefault();
            let url = `?area=${this.id}&name=${this.value}`;
            location.assign(url)
        }

        let selectAll = document.querySelectorAll('select');
        selectAll.forEach((select) => {
            select.addEventListener('change', valueChange);
        });
    </script>
</body>

</html>

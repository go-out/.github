    <script>
        // IFrame Player API の読み込み
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/player_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var videoId;

        function onYouTubePlayerAPIReady() {
            player = new YT.Player('player', {
                playerVars: {
                    'playsinline': 1,
                    'autoplay': 1,
                    'controls': 0,
                    'rel': 0
                }
            });
        };

        document.addEventListener("readystatechange", (event) => {
            if (event.target.readyState === "interactive") {
                addMarker(gooutArr.features)
                addMarker(osakaSpot.features)
                addMarker(osakaAlps.features)
                addMarker(osakaCycling.features)
                addMarker(osakaFerry.features)
            } else if (event.target.readyState === "complete") {
                const goout = document.querySelector('#map');
                const title = document.querySelector('#title');
                const dialog = document.querySelector("dialog");
                const close = document.querySelector('dialog #close');
                const menu = document.querySelector('footer button');
                goout.style.pointerEvents = 'auto';
                goout.style.userSelect = 'auto';
                title.hidden = true;
                menu.hidden = false;

                menu.addEventListener('click', function () {
                    dialog.showModal();
                })

                close.addEventListener('click', function () {
                    dialog.close();
                })

                const main = document.querySelector('main')
                main.addEventListener('click', function () {
                    main.hidden = true;
                    player.pauseVideo()
                });
            }
        })
    </script>
</head>

<body>
    <h1 id="title">
        <strong class="goout">Osaka Map</strong>
        <button type="button" class="goout">大阪観光マップ</button>
    </h1>

    <header>
        <h2 id="latlng" class="goout shadow"></h2>
        <address id="address" class="goout"></address>
        <h3 id="datetime" class="goout"></h3>
    </header>

    <div id="map"></div>

    <main hidden>
        <div id="player"></div>
    </main>

    <footer>
        <button type="button" hidden></button>
    </footer>

    <dialog>
        <input type="button" id="close" value="×">
        <details class="goout">
            <summary>
                <small>このウェブサイトに投稿された位置情報を使って、私（わたしたち）がいた場所を集めた様々な地図を作成します。</small>
            </summary>
        </details>

        <h3 class="relax">
            We Create a
            <b>Map</b>
            of
            <u>Where I（We）Were</u>
            by location informations submit on this website.
            <br>
            <small class="relax">
                You can add pins of your current locationon on this map by click
                <strong class="goout">I'm here !</strong>
            </small>
        </h3>
    </dialog>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoicGVodSIsImEiOiJja3R4Y3diNmIybTg5Mm9waWgwYTdsc3FyIn0.lVvnPZ3aa6332EaWJIxPaQ';

        let css = 'mapbox://styles/pehu/ckx1e2xhw13kw14s4rjhaiv17',
            center = [135.5020763952882, 34.69376772507822];

        const bounds = [
            [135.0590791040609, 34.256820829045935], // 南西座標
            [135.78320173410242, 35.061027592581866] // 北東座標
        ]

        const map = new mapboxgl.Map({
            container: 'map',
            center: center,
            style: css,
            zoom: 9.87654321,
            scrollZoom: true,
            projection: 'globe',
            attributionControl: false,
            maxBounds: bounds
        })

        map.addControl(
            new mapboxgl.GeolocateControl({
                positionOptions: {
                    enableHighAccuracy: true
                },
                // デバイスの位置の変更に応じて位置情報を更新
                trackUserLocation: true,
                // デバイスが向いている方向を矢印で描画
                showUserHeading: true
            })
        )
        map.addControl(new mapboxgl.NavigationControl())
        map.addControl(new mapboxgl.FullscreenControl())
    </script>
    <script src="line.v1.js"></script>
    <script src="../mapbox/polygon/index.v1.js"></script>
</body>

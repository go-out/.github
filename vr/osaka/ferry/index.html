<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <script src="index.js"></script>
    <script src="../../index.js"></script>
    <script>
        // ?name=名前

        const urlParam = location.search.substring(1)
        if (urlParam) {
            let paramArr = [],
                param = urlParam.split('&')
            for (arr = 0; arr < param.length; arr++) {
                var paramItem = param[arr].split('=')
                paramArr[paramItem[0]] = paramItem[1]
            }
            let json = paramArr.name + '.json'
            indexJSON(json)
        } else {
            let json = 'index.json'
            indexJSON(json)
        }
    </script>

    <!--og:meta-->
    <meta content="website" property="og:type">
    <title>Go Out | 渡し船に乗ろう</title>
    <meta content="Go Out | 渡し船に乗ろう" property="og:title">
    <meta content="Osaka Ferry Virtual Cruise" name="description">
    <meta content="Osaka Ferry Virtual Cruise" property="og:description">

    <link rel="icon" href="icon.png">
    <link rel="icon" href="icon.png" sizes="192x192">
    <link rel="apple-touch-icon-precomposed" href="icon.png" sizes="180x180">

    <style>
        #map {
            width: 100%;
            height: 75vh;
        }

        .mapboxgl-popup-content {
            font-family: "Kristina", 'Zen Maru Gothic', cursive;
            font-size: 1rem;
            line-height: 150%;
        }

        .mapboxgl-popup-content strong {
            background: lightskyblue;
            color: lemonchiffon;
            padding: 0.25rem;
        }

        .mapboxgl-popup-content strong,
        .mapboxgl-popup-close-button {
            font-size: 150%;
        }

        .mapboxgl-popup-close-button {
            color: lightskyblue;
            outline: none;
        }

        .mapboxgl-marker {
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
            z-index: 5;
        }

        .mapboxgl-marker.vr {
            background-image: url(icon.png);
            width: 2rem;
            height: 2rem;
        }

        .mapboxgl-marker.hello {
            background-image: url(../../icon/hello.jpg);
            border-radius: 50%;
            width: 2rem;
            height: 2rem;
        }
    </style>

    <!--for Twitter-->
    <meta content="summary_large_image" name="twitter:card">
    <meta content="https://creative-community.space/map/vr/osaka/ferry/" property="og:url">
    <meta content="https://creative-community.space/map/vr/osaka/ferry/index.png" property="og:image">
    <meta content="https://creative-community.space/map/vr/osaka/ferry/index.png" name="twitter:image:src">

    <link rel="stylesheet" href="../../index.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap" rel="stylesheet">

    <link href='https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css' rel='stylesheet' />
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js'></script>
</head>

<body class="start">
    <main>
        <header>
            <small id="year"></small>
            <h1>
                <strong>Go Out</strong>
            </h1>
            <h2>
                <strong id="month"></strong>
                <strong id="day"></strong>
            </h2>
            <button id="play" type="button"></button>
        </header>
    </main>

    <footer>
        <h3>
            <strong id="title"></strong>
        </h3>
        <section id="info"></section>
        <div id="links" hidden>
            <h3>関連ページ Related Pages</h3>
        </div>
        <select name="ferry" id="osaka">
            <option selected disabled>大阪市渡船一覧</option>
            <option value="?name=tempozan">天保山渡船</option>
            <option value="?name=zonbee">甚兵衛渡船</option>
            <option value="?name=chitose">千歳渡船</option>
            <option value="?name=ochiaikami">落合上渡船</option>
            <option value="?name=ochiaishimo">落合下渡船</option>
            <option value="?name=senbonmatsu">千本松渡船</option>
            <option value="?name=funamachi">船町渡船</option>
            <option value="?name=kizugawa">木津川渡船</option>
        </select>
    </footer>

    <div id="map"></div>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoicGVodSIsImEiOiJja3R4Y3diNmIybTg5Mm9waWgwYTdsc3FyIn0.lVvnPZ3aa6332EaWJIxPaQ';

        let css = 'mapbox://styles/mapbox/standard',
            center = [135.45453372484548, 34.64442238709225],
            zoom = 12.345;

        const bounds = [
            [135.4297410995881, 34.61891585103439], // 南西座標
            [135.48662746795293, 34.6699098318323] // 北東座標
        ];

        const map = new mapboxgl.Map({
            container: 'map',
            center: center,
            style: css,
            pitch: 0,
            bearing: 0,
            zoom: zoom,
            maxBounds: bounds,
            scrollZoom: false,
            projection: 'globe',
            attributionControl: false
        })
        map.addControl(new mapboxgl.NavigationControl())

        map.on('load', () => {
            for (const marker of osakaFerry.features) {
                const el = document.createElement('div');
                el.className = marker.properties.tags;

                new mapboxgl.Marker(el, {
                    offset: [0, 0]
                })
                    .setLngLat(marker.geometry.coordinates)
                    .setPopup(
                        new mapboxgl.Popup({
                            offset: 12
                        })
                            .setHTML(`
                            <p><strong>${marker.properties.title}</strong></p>
                            ${marker.properties.address}
                            `
                            )
                    )
                    .addTo(map)

                el.addEventListener('click', (e) => {
                    map.flyTo({
                        center: marker.geometry.coordinates,
                        essential: true
                    })
                })
            };
        });

        function valueChange(e) {
            // イベントが発生した時の処理
            e.preventDefault();
            let url = this.value;
            location.assign(url)
        }

        let selectAll = document.querySelectorAll('select');
        selectAll.forEach((select) => {
            select.addEventListener('change', valueChange);
        });
    </script>
</body>

</html>

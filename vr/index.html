<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <script src="index.js"></script>
    <script>
        // ?area=名前&id=名前&name=名前
        const urlParam = location.search.substring(1)
        if (urlParam) {
            let paramArr = [],
                param = urlParam.split('&')
            for (arr = 0; arr < param.length; arr++) {
                var paramItem = param[arr].split('=')
                paramArr[paramItem[0]] = paramItem[1]
            }
            const json = paramArr.id + "/" + paramArr.name + '.json'
            indexJSON(paramArr.area + "/" + json)
        } else {
            indexJSON('index.json');
        }
    </script>

    <!--og:meta-->
    <meta content="website" property="og:type">
    <title>Go Out | 行ったことのない場所へ行く</title>
    <meta content="Go Out | 行ったことのない場所へ行く" property="og:title">
    <meta content="知っていることの外へ、わからないところまで出かける" name="description">
    <meta content="知っていることの外へ、わからないところまで出かける" property="og:description">

    <link rel="icon" href="../profile/img/favicon.png">

</head>

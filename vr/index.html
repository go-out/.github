<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <script src="index.js"></script>
    <script>
        // ?id=名前&area=名前&name=名前
        const urlParam = location.search.substring(1)
        if (urlParam) {
            let paramArr = [],
                param = urlParam.split('&')
            for (arr = 0; arr < param.length; arr++) {
                var paramItem = param[arr].split('=')
                paramArr[paramItem[0]] = paramItem[1]
            }
            const json = paramArr.area + "/" + paramArr.name + '.json'
            indexJSON(paramArr.id + "/" + json)
        } else {
            indexJSON('index.json');
        }
    </script>

    <!--og:meta-->
    <meta content="website" property="og:type">
    <title>VR</title>
    <meta content="VR" property="og:title">
    <meta content="Video" name="description">
    <meta content="Video" property="og:description">

    <link rel="icon" href="../profile/img/favicon.png">
    <link rel="icon" href="../profile/img/mobile.png" sizes="192x192">
    <link rel="apple-touch-icon-precomposed" href="../profile/img/mobile.png" sizes="180x180">

    <!--for Twitter-->
    <meta content="summary_large_image" name="twitter:card">
    <meta content="/vr/" property="og:url">
    <meta content="/vr/card.png" property="og:image">
    <meta content="/vr/card.png" name="twitter:image:src">

    <link rel="stylesheet" href="index.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap" rel="stylesheet">
</head>

    <main></main>

    <footer>

</body>

</html>
